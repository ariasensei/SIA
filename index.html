  <script src="/_sdk/b19ec5e9a6bcccbf.editing_sdk.js" integrity="sha512-zBJgQuXCQdyGFqXgZwfp8p9NowwbyuWhOK/NGHf9nps+IMSAyeeSyv3qhtfcnKWA9sWownxUevRqEhsjnjL55w=="></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      lucide.createIcons();

      const response = document.getElementById("activity-response");
      const clearResponse = document.getElementById("clear-response");
      const modelAnswer = document.getElementById("model-answer");
      const revealButton = document.getElementById("toggle-model-answer");

      response.addEventListener("input", () => {
        sessionStorage.setItem("sia-week-1-response", response.value);
      });

      response.value = sessionStorage.getItem("sia-week-1-response") || "";

      clearResponse.addEventListener("click", () => {
        response.value = "";
        sessionStorage.removeItem("sia-week-1-response");
        response.focus();
      });

      revealButton.addEventListener("click", () => {
        const isHidden = modelAnswer.classList.toggle("hidden");
        revealButton.setAttribute("aria-expanded", String(!isHidden));
      });

      const answeredQuestions = new Map();
      const scoreDisplay = document.getElementById("score-display");
      const feedback = document.getElementById("quiz-feedback");
      const quizButtons = document.querySelectorAll(".quiz-option");

      function updateScore() {
        const correct = [...answeredQuestions.values()].filter(Boolean).length;
        scoreDisplay.textContent = correct + " / 4";
      }

      quizButtons.forEach((button) => {
        button.addEventListener("click", () => {
          const questionId = button.dataset.question;
          if (answeredQuestions.has(questionId)) return;

          const correct = button.dataset.correct === "true";
          answeredQuestions.set(questionId, correct);

          document.querySelectorAll('.quiz-option[data-question="' + questionId + '"]').forEach((option) => {
            option.disabled = true;
            if (option.dataset.correct === "true") option.classList.add("correct");
          });

          if (!correct) button.classList.add("incorrect");

          feedback.textContent = correct
            ? "Correct — you identified the integration idea."
            : "Not quite. The correct answer is highlighted in green.";
          updateScore();
        });
      });

      document.getElementById("reset-quiz").addEventListener("click", () => {
        answeredQuestions.clear();
        quizButtons.forEach((button) => {
          button.disabled = false;
          button.classList.remove("correct", "incorrect");
        });
        feedback.textContent = "";
        updateScore();
      });
    });
  </script>
